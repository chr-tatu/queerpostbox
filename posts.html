---
layout: posts
title: All Postcards
---
<div class="posts-header">
  <div class="view-toggle">
    <button class="view-btn active" data-view="grid">Grid</button>
    <button class="view-btn" data-view="column">Column</button>
  </div>
</div>
<div class="postcard-grid" id="postcard-grid" data-total-posts="{{ site.posts.size }}">
  {% assign visible_posts = 0 %}
  {% for post in site.posts %}
    {% assign visible_posts = visible_posts | plus: 1 %}
    <div class="postcard-item {% if visible_posts > 16 %}hidden{% endif %}" 
         data-index="{{ visible_posts }}"
         onmouseenter="flipCard(this, true)"
         onmouseleave="flipCard(this, false)">
      <a href="{{ post.url | relative_url }}">
        {% if post.image-front %}
          <img src="{{ post.image-front | relative_url }}" 
               alt="{{ post.title }}" 
               class="postcard-image"
               data-front="{{ post.image-front | relative_url }}"
               data-back="{{ post.image-back | relative_url }}">
        {% else %}
          <div style="background: #f0f0f0; height: 100%; display: flex; align-items: center; justify-content: center; color: #666;">
            No Image
          </div>
        {% endif %}
      </a>
    </div>
  {% endfor %}
</div>
