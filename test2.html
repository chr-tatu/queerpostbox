<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Reactive Background</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }

        .scrollable {
            height: 100vh;
            overflow-y: scroll;
        }

        .content {
            height: 600vh; /* Adjust for testing large scroll areas */
            margin: 0;
            background: linear-gradient(
        to bottom,
        rgba(255, 0, 0, 0.5) 0%,
        rgba(255, 0, 0, 0.5) 16.66%,
        rgba(255, 165, 0, 0.5) 16.66%,
        rgba(255, 165, 0, 0.5) 33.33%,
        rgba(255, 255, 0, 0.5) 33.33%,
        rgba(255, 255, 0, 0.5) 50%,
        rgba(0, 255, 0, 0.5) 50%,
        rgba(0, 255, 0, 0.5) 66.66%,
        rgba(0, 0, 255, 0.5) 66.66%,
        rgba(0, 0, 255, 0.5) 83.33%,
        rgba(75, 0, 130, 0.5) 83.33%,
        rgba(75, 0, 130, 0.5) 100%
            );
            background-size: 100% 100%;
        }
    </style>
</head>
<body>
    <div class="scrollable">
        <div class="content"></div>
    </div>
    <script>
        const content = document.querySelector('.content');

        document.querySelector('.scrollable').addEventListener('scroll', (event) => {
            const scrollTop = event.target.scrollTop;
            const scrollHeight = event.target.scrollHeight - window.innerHeight;

            // Calculate the scroll percentage
            const scrollPercent = scrollTop / scrollHeight;

            // Update the background position
            content.style.backgroundPosition = `0 ${scrollPercent * 100}%`;
        });
    </script>
</body>
</html>
